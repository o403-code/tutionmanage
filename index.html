<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tuition Manager Pro</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --primary:#6366f1;
  --text:#e2e8f0;
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:var(--text);
}

.sidebar{
  width:230px;
  height:100vh;
  background:#020617;
  position:fixed;
  padding:20px;
}

.sidebar h2{color:white;}

.sidebar button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  background:none;
  color:#cbd5f5;
  cursor:pointer;
}

.sidebar button:hover{
  background:var(--primary);
  color:white;
}

.main{
  margin-left:250px;
  padding:20px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin:10px 0;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid #334155;
}

.att-btn{
  width:28px;
  height:28px;
  border-radius:50%;
  border:2px solid #64748b;
  cursor:pointer;
  background:transparent;
}

.present.active{background:#22c55e;border:none;}
.absent.active{background:#ef4444;border:none;}
.late.active{background:#facc15;border:none;}

input,select{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button{
  cursor:pointer;
}

button.primary{
  background:var(--primary);
  color:white;
  padding:8px 12px;
  border:none;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px){

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
    display:flex;
    overflow-x:auto;
  }

  .sidebar button{
    flex:1;
    font-size:12px;
    padding:8px;
  }

  .main{
    margin-left:0;
    padding:10px;
  }

  table{
    font-size:12px;
  }

  input,select{
    width:100%;
    box-sizing:border-box;
  }

  .card{
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Manager</h2>
  <button onclick="show('students')">Students</button>
  <button onclick="show('attendance')">Attendance</button>
  <button onclick="show('report')">Report</button>
  <button onclick="show('payment')">Payment</button>
</div>

<div class="main">

<!-- STUDENTS -->
<div id="students">
  <div class="card">
    <input id="name" placeholder="Student Name">
    <button onclick="addStudent()">Add</button>
  </div>

  <table>
    <tbody id="studentList"></tbody>
  </table>
</div>

<!-- ATTENDANCE -->
<div id="attendance" style="display:none;">
  <div class="card">
    <input type="date" id="date">
  </div>

  <table>
    <tbody id="attTable"></tbody>
  </table>

  <button class="primary" onclick="saveAttendance()">Save</button>
</div>

<!-- REPORT -->
<div id="report" style="display:none;">

  <div class="card">
    <h3>Attendance Report</h3>
    <input type="month" id="reportMonth">
    <button onclick="generateReport()">Generate</button>

    <select id="studentSelect"></select>
    <button onclick="printStudent()">Print Individual</button>
  </div>

  <div id="reportBox"></div>

  <div class="card">
    <h3>Payment Report</h3>
    <select id="payStudentReport"></select>
    <button onclick="generatePaymentReport()">Generate</button>

    <div id="paymentReportBox"></div>
  </div>

  <div class="card">
    <h3>Exam Entry</h3>

    <select id="examStudent"></select>

    <input id="examName" placeholder="Exam Name">
    <input id="topic" placeholder="Topic">

    <input type="month" id="examMonthInput">
    <input type="date" id="examDate">

    <input id="obt" placeholder="Obtained Marks">
    <input id="total" placeholder="Total Marks">

    <button onclick="addExam()">Add Exam</button>
  </div>

  <div class="card">
    <h3>Exam Result Card</h3>

    <select id="examStudentResult"></select>
    <input type="month" id="examMonth">

    <button onclick="printExamCard()">Generate</button>
  </div>

</div>

<!-- PAYMENT -->
<div id="payment" style="display:none;">
  <div class="card">
    <select id="payStudent"></select>
    <input type="month" id="payMonth">
    <input id="amount" placeholder="Amount">
    <button onclick="addPayment()">Pay</button>
  </div>

  <ul id="payList"></ul>
</div>

</div>

<!-- SAME HTML + CSS (UNCHANGED) -->

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let attendance = JSON.parse(localStorage.getItem("attendance")) || [];
let payments = JSON.parse(localStorage.getItem("payments")) || [];
let exams = JSON.parse(localStorage.getItem("exams")) || [];

let temp = {};

function save(){
  localStorage.setItem("students", JSON.stringify(students));
  localStorage.setItem("attendance", JSON.stringify(attendance));
  localStorage.setItem("payments", JSON.stringify(payments));
  localStorage.setItem("exams", JSON.stringify(exams));
}

function show(id){
  document.querySelectorAll(".main > div").forEach(d => d.style.display="none");
  document.getElementById(id).style.display="block";

  if(id === "attendance"){
    renderAttendance();
  }
}

/* ================= STUDENT (UNCHANGED) ================= */
function addStudent(){
  let name=document.getElementById("name");
  if(!name.value.trim()) return;

  students.push({id:String(Date.now()), name:name.value});
  name.value="";
  save();
  render();
}

/* ================= PAYMENT (UNCHANGED) ================= */
function addPayment(){
  let student=document.getElementById("payStudent").value;
  let month=document.getElementById("payMonth").value;
  let amount=document.getElementById("amount").value;

  if(!student || !month || !amount) return;

  payments.push({
    student,
    month,
    amount,
    date:new Date().toLocaleDateString()
  });

  save();
  renderPayments();
}

/* ================= ATTENDANCE (UNCHANGED) ================= */
function renderAttendance(){
  let table = document.getElementById("attTable");
  table.innerHTML = "";

  students.forEach(s=>{
    table.innerHTML += `
      <tr>
        <td>${s.name}</td>
        <td>
          <button class="att-btn present" onclick="mark('${s.id}','present',this)">P</button>
          <button class="att-btn absent" onclick="mark('${s.id}','absent',this)">A</button>
          <button class="att-btn late" onclick="mark('${s.id}','late',this)">L</button>
        </td>
      </tr>
    `;
  });
}

function mark(id,status,btn){
  temp[id] = status;

  let parent = btn.parentElement;
  parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function saveAttendance(){
  let date = document.getElementById("date").value;
  if(!date) return alert("Select date");

  Object.keys(temp).forEach(id=>{
    attendance.push({
      student:id,
      date,
      status:temp[id]
    });
  });

  temp = {};
  save();
  alert("Attendance Saved ✅");
}

/* ================= ✅ NEW: ATTENDANCE REPORT FIX ================= */

function generateReport(){
  let month = document.getElementById("reportMonth").value;
  let box = document.getElementById("reportBox");

  if(!month){
    box.innerHTML = "Select month";
    return;
  }

  let filtered = attendance.filter(a => a.date.startsWith(month));

  if(filtered.length === 0){
    box.innerHTML = "No attendance found";
    return;
  }

  let html = `<div class="card"><h3>Attendance Report (${month})</h3>`;

  students.forEach(s=>{
    html += `<h4>${s.name}</h4>`;

    let data = filtered.filter(d => d.student == s.id);

    if(data.length === 0){
      html += `<p>No record</p>`;
    }else{
      data.forEach(d=>{
        html += `<p>${d.date} - ${d.status}</p>`;
      });
    }
  });

  html += `</div>`;
  box.innerHTML = html;
}

/* PRINT INDIVIDUAL */
function printStudent(){
  let studentId = document.getElementById("studentSelect").value;
  let month = document.getElementById("reportMonth").value;

  let s = students.find(x=>x.id==studentId);
  if(!s || !month) return;

  let data = attendance.filter(a => 
    a.student == studentId && a.date.startsWith(month)
  );

  let html = `<h2>${s.name} - Attendance (${month})</h2>
  <table border="1">
  <tr><th>Date</th><th>Status</th></tr>`;

  data.forEach(d=>{
    html += `<tr>
      <td>${d.date}</td>
      <td>${d.status}</td>
    </tr>`;
  });

  html += `</table>`;

  let w = window.open();
  w.document.write(html);
  w.print();
}

/* ================= REST (UNCHANGED) ================= */

function generatePaymentReport(){
  let studentId = document.getElementById("payStudentReport").value;
  let box = document.getElementById("paymentReportBox");

  let s = students.find(x=>x.id==studentId);
  if(!s){
    box.innerHTML="Select student";
    return;
  }

  let data = payments.filter(p=>p.student==studentId);

  let html = `<div class="card">
  <h3>${s.name} Payment Report</h3>`;

  data.forEach(p=>{
    html += `<p>Month: ${p.month} | Amount: ৳${p.amount} | Date: ${p.date}</p>`;
  });

  html += `</div>`;
  box.innerHTML = html;
}

function addExam(){
  exams.push({
    student: document.getElementById("examStudent").value,
    examName: document.getElementById("examName").value,
    topic: document.getElementById("topic").value,
    date: document.getElementById("examDate").value,
    obt: document.getElementById("obt").value,
    total: document.getElementById("total").value,
    month: document.getElementById("examMonthInput").value
  });

  save();
}

function printExamCard(){
  let studentId=document.getElementById("examStudentResult").value;
  let month=document.getElementById("examMonth").value;

  let s=students.find(x=>x.id==studentId);
  if(!s) return;

  let data=exams.filter(e=>e.student==studentId && e.month==month);

  let total=0,obt=0;

  let html=`<h2>${s.name} Result Card</h2><table border="1">`;

  data.forEach(d=>{
    total+=Number(d.total||0);
    obt+=Number(d.obt||0);

    html+=`<tr>
      <td>${d.examName}</td>
      <td>${d.topic}</td>
      <td>${d.obt}/${d.total}</td>
      <td>${d.date}</td>
    </tr>`;
  });

  html+=`</table><h3>Total: ${obt}/${total}</h3>`;

  let w=window.open();
  w.document.write(html);
  w.print();
}

function render(){
  let list=document.getElementById("studentList");
  let pay=document.getElementById("payStudent");
  let s1=document.getElementById("studentSelect");
  let s2=document.getElementById("payStudentReport");
  let s3=document.getElementById("examStudent");
  let s4=document.getElementById("examStudentResult");

  list.innerHTML="";
  pay.innerHTML="";
  s1.innerHTML="";
  s2.innerHTML="";
  s3.innerHTML="";
  s4.innerHTML="";

  students.forEach(s=>{
    list.innerHTML+=`<tr><td>${s.name}</td></tr>`;
    pay.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
    s1.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
    s2.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
    s3.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
    s4.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
  });

  renderPayments();
}

function renderPayments(){
  let list=document.getElementById("payList");
  list.innerHTML="";

  payments.forEach(p=>{
    let s=students.find(x=>x.id==p.student);
    if(!s) return;

    list.innerHTML+=`<li>${s.name} - ${p.month} - ৳${p.amount}</li>`;
  });
}

render();

</script>

</body>
</html>
